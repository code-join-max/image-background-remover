name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Setup Functions
        run: |
          mkdir -p dist/functions/api
          cp functions/api/\[\[path\]\].js dist/functions/api/
          ls -la dist/functions/api/
        
      - name: Install Wrangler
        run: npm install -g wrangler
        
      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages deploy dist --project-name=image-background-remover --branch=main --commit-message="GitHub Actions deployment"
        env:
          CLOUDFLARE_API_TOKEN: iPnAwBV7GeVJi9yFfb3x41BcDLECg1qZsvS48whE
          CLOUDFLARE_ACCOUNT_ID: 7f89a7f424cc4a66c8edcfc56d6b91da
